name: UXOps AI CI

on:
  push:
    branches: [ main, milestone-* ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Linters
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 ruff

      - name: Run Ruff / Flake8 Lint
        run: |
          ruff check backend/ || flake8 backend/

      - name: Check Python Code Formatting (Black)
        run: |
          black --check backend/

      - name: Check Python Import Ordering (Isort)
        run: |
          isort --check-only backend/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
        continue-on-error: true

      - name: Install Frontend Linters
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm run lint || true
          fi
        shell: bash

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: uxops_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/uxops_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          if [ -d backend/tests ]; then
            pytest backend/tests/ --cov=backend --cov-report=xml || echo "No tests configured yet"
          fi

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
        continue-on-error: true

      - name: Install Frontend Dependencies & Run Tests
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm run test || echo "No frontend tests configured yet"
          fi
        shell: bash
